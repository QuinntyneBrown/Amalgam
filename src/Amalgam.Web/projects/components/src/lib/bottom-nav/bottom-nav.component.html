<nav class="bottom-nav">
  @for (item of items(); track item.route) {
    <button
      class="nav-item"
      [class.active]="item.route === activeRoute()"
      (click)="navigate.emit(item.route)"
    >
      <mat-icon>{{ item.icon }}</mat-icon>
      <span class="nav-label">{{ item.label }}</span>
    </button>
  }
</nav>
