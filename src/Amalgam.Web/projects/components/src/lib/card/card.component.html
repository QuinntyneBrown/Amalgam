<mat-card>
  @if (title() || subtitle()) {
    <mat-card-header>
      @if (title()) {
        <mat-card-title>{{ title() }}</mat-card-title>
      }
      @if (subtitle()) {
        <mat-card-subtitle>{{ subtitle() }}</mat-card-subtitle>
      }
    </mat-card-header>
  }
  <mat-card-content>
    <ng-content />
  </mat-card-content>
  <mat-card-actions>
    <ng-content select="[card-actions]" />
  </mat-card-actions>
</mat-card>
