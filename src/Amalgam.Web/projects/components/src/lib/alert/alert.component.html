<div class="alert" [class]="'alert-' + severity()">
  <mat-icon class="alert-icon">{{ icon() }}</mat-icon>
  @if (title()) {
    <div class="alert-content">
      <span class="alert-title">{{ title() }}</span>
      @if (description()) {
        <span class="alert-description">{{ description() }}</span>
      }
    </div>
  } @else {
    <span class="alert-message">{{ message() }}</span>
  }
  @if (dismissible()) {
    <button class="dismiss-btn" (click)="dismissed.emit()">
      <mat-icon>close</mat-icon>
    </button>
  }
</div>
