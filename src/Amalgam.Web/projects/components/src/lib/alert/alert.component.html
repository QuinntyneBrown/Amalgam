<div class="alert" [class]="'alert-' + severity()">
  <mat-icon class="alert-icon">{{ icon() }}</mat-icon>
  <span class="alert-message">{{ message() }}</span>
  @if (dismissible()) {
    <button class="dismiss-btn" (click)="dismissed.emit()">
      <mat-icon>close</mat-icon>
    </button>
  }
</div>
